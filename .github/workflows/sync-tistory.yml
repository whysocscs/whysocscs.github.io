name: Sync Tistory Images

on:
  schedule:
    - cron: '0 9 * * 1'  # 매주 월요일 오전 9시 UTC (한국 시각 18시)
  workflow_dispatch:
    inputs:
      post_url:
        description: '특정 Tistory 포스트 URL (비워두면 전체 포스트 검사)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        run: |
          if [ -n "${{ github.event.inputs.post_url }}" ]; then
            python scripts/sync_tistory.py --post-url "${{ github.event.inputs.post_url }}"
          else
            python scripts/sync_tistory.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "Auto-sync: update images from Tistory"
            git push
          fi
